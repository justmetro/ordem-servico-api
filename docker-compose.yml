services:
  postgres:
    image: postgres:16
    container_name: ordem_servico_postgres
    environment:
      POSTGRES_DB: ordem_servico_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
