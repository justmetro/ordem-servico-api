spring:
  application:
    name: ordem-servico-api
  datasource:
    url: jdbc:postgresql://localhost:5432/ordem_servico_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Ordem de Serviço API
    description: API REST corporativa para gestão de ordens de serviço
    version: 1.0.0

app:
  security:
    jwt:
      secret: ${JWT_SECRET:uma-chave-secreta-local-com-pelo-menos-32-caracteres}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  bootstrap:
    admin:
      nome: ${ADMIN_NOME:Administrador}
      email: ${ADMIN_EMAIL:admin@email.com}
      senha: ${ADMIN_SENHA:123456}
