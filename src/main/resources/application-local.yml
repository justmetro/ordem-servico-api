spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ordem_servico_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET:uma-chave-secreta-local-com-pelo-menos-32-caracteres}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  bootstrap:
    admin:
      nome: ${ADMIN_NOME:Administrador}
      email: ${ADMIN_EMAIL:admin@email.com}
      senha: ${ADMIN_SENHA:123456}
